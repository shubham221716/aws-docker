name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔐 Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🏗 Build Image
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-static-site .

    # 🚀 Push Image
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/my-static-site

    # 🖥 Deploy to EC2 (THIS YOU ADD)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-static-site
          docker stop my-container || true
          docker rm my-container || true
          docker run -d -p 8080:80 --name my-container ${{ secrets.DOCKER_USERNAME }}/my-static-site
